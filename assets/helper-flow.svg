<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="260" viewBox="0 0 1100 260" role="img" aria-labelledby="title desc">
  <title id="title">OSS Supporter helper flow</title>
  <desc id="desc">A five step flow from score, preflight, patch, review, to publish impact.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1100" height="260" rx="18" fill="url(#bg)"/>
  <g fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round">
    <path d="M210 130 H278"/>
    <path d="M270 122 L282 130 L270 138"/>
    <path d="M410 130 H478"/>
    <path d="M470 122 L482 130 L470 138"/>
    <path d="M610 130 H678"/>
    <path d="M670 122 L682 130 L670 138"/>
    <path d="M810 130 H878"/>
    <path d="M870 122 L882 130 L870 138"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="58" width="170" height="144" rx="10" fill="#ffffff" stroke="#0f766e"/>
    <rect x="240" y="58" width="170" height="144" rx="10" fill="#ffffff" stroke="#2563eb"/>
    <rect x="440" y="58" width="170" height="144" rx="10" fill="#ffffff" stroke="#7c3aed"/>
    <rect x="640" y="58" width="170" height="144" rx="10" fill="#ffffff" stroke="#c2410c"/>
    <rect x="840" y="58" width="220" height="144" rx="10" fill="#ffffff" stroke="#334155"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#0f172a">
    <text x="125" y="95" text-anchor="middle" font-size="18" font-weight="700">Score</text>
    <text x="125" y="126" text-anchor="middle" font-size="14">reject weak leads</text>
    <text x="125" y="150" text-anchor="middle" font-size="13" fill="#475569">lead-score</text>
    <text x="125" y="173" text-anchor="middle" font-size="13" fill="#475569">metadata first</text>

    <text x="325" y="95" text-anchor="middle" font-size="18" font-weight="700">Preflight</text>
    <text x="325" y="126" text-anchor="middle" font-size="14">know local limits</text>
    <text x="325" y="150" text-anchor="middle" font-size="13" fill="#475569">repo-capability</text>
    <text x="325" y="173" text-anchor="middle" font-size="13" fill="#475569">source-truth</text>

    <text x="525" y="95" text-anchor="middle" font-size="18" font-weight="700">Patch</text>
    <text x="525" y="126" text-anchor="middle" font-size="14">small useful diff</text>
    <text x="525" y="150" text-anchor="middle" font-size="13" fill="#475569">focused tests</text>
    <text x="525" y="173" text-anchor="middle" font-size="13" fill="#475569">honest checks</text>

    <text x="725" y="95" text-anchor="middle" font-size="18" font-weight="700">Review</text>
    <text x="725" y="126" text-anchor="middle" font-size="14">follow public state</text>
    <text x="725" y="150" text-anchor="middle" font-size="13" fill="#475569">status helpers</text>
    <text x="725" y="173" text-anchor="middle" font-size="13" fill="#475569">maintainer lessons</text>

    <text x="950" y="95" text-anchor="middle" font-size="18" font-weight="700">Publish Impact</text>
    <text x="950" y="126" text-anchor="middle" font-size="14">aggregate only</text>
    <text x="950" y="150" text-anchor="middle" font-size="13" fill="#475569">token-meter</text>
    <text x="950" y="173" text-anchor="middle" font-size="13" fill="#475569">public-boundary</text>
  </g>
</svg>
