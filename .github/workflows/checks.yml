name: checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  public-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run lightweight checks
        run: python tools/run_checks.py
